<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axtra Broadcast | Interactive Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0b0e11;
            --panel: rgba(255, 255, 255, 0.03);
            --accent: #8b5cf6;
            --text: #f8fafc;
            --text-dim: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
        }

        .app-container { padding: 40px; max-width: 1400px; margin: 0 auto; }

        /* INNOVATIVE CALENDAR GRID */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .cal-card {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .cal-card:hover {
            transform: translateY(-10px);
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--accent);
        }

        .cal-card .date-circle {
            width: 50px; height: 50px; background: var(--accent);
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-weight: 800;
            margin-bottom: 15px; font-size: 14px;
        }

        /* FULLSCREEN MODAL */
        #eventModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); z-index: 5000;
            display: none; align-items: center; justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #161b22; width: 100%; max-width: 700px;
            border-radius: 40px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            animation: modalPop 0.5s ease-out;
        }

        @keyframes modalPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .modal-banner { height: 250px; background-size: cover; background-position: center; position: relative; }
        .modal-body { padding: 40px; }
        .tag { display: inline-block; padding: 5px 15px; border-radius: 20px; background: var(--accent); font-size: 10px; font-weight: 800; margin-right: 10px; margin-bottom: 15px;}

        /* ADMIN BAR */
        .admin-fab {
            position: fixed; bottom: 40px; right: 40px;
            background: var(--accent); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 800;
            cursor: pointer; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
            display: none;
        }

        /* FORM STYLES */
        .glass-input {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            color: white; margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h1 style="font-family: 'Syncopate'; font-size: 35px; color: var(--accent);">BROADCASTS</h1>
            <p style="opacity: 0.5;">Interactive Event Calendar</p>
        </div>
        <a href="index.html" style="text-decoration: none; color: var(--text-dim); font-size: 12px;">← EXIT TO STUDIO</a>
    </header>

    <div class="calendar-grid" id="calendar">
        </div>
</div>

<div id="eventModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-banner" id="mBanner"></div>
        <div class="modal-body">
            <div id="mTags"></div>
            <h1 id="mTitle" style="font-family: 'Syncopate'; margin-bottom: 10px;"></h1>
            <p id="mHost" style="color: var(--accent); font-weight: 800; margin-bottom: 20px;"></p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <div>
                    <label style="font-size: 10px; opacity: 0.5;">DATE & TIME</label>
                    <p id="mDate"></p>
                </div>
                <div>
                    <label style="font-size: 10px; opacity: 0.5;">ARTIST</label>
                    <p id="mArtist"></p>
                </div>
                <div>
                    <label style="font-size: 10px; opacity: 0.5;">LANGUAGE</label>
                    <p id="mLong"></p>
                </div>
                <div>
                    <label style="font-size: 10px; opacity: 0.5;">GENRE</label>
                    <p id="mGenre"></p>
                </div>
            </div>
            <button class="glass-input" style="margin-top: 30px; cursor: pointer; background: var(--accent);" onclick="closeModal()">CLOSE DETAILS</button>
        </div>
    </div>
</div>

<div id="adminModal" style="display:none; position: fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px;">
    <div class="glass-card" style="max-width: 500px; width:100%; background: #161b22; padding: 40px; border-radius: 30px;">
        <h2 style="margin-bottom: 20px;">Schedule Broadcast</h2>
        <input type="text" id="pTitle" placeholder="Podcast Name" class="glass-input">
        <input type="text" id="pHost" placeholder="Host Name" class="glass-input">
        <input type="text" id="pArtist" placeholder="Artist Name" class="glass-input">
        <input type="text" id="pLong" placeholder="Language (e.g. Hindi/English)" class="glass-input">
        <input type="text" id="pGenre" placeholder="Type of Music" class="glass-input">
        <input type="text" id="pBanner" placeholder="Banner Image URL" class="glass-input">
        <input type="datetime-local" id="pDate" class="glass-input">
        <button onclick="savePodcast()" class="glass-input" style="background: var(--accent); font-weight: 800; cursor: pointer;">PUBLISH TO CALENDAR</button>
        <button onclick="document.getElementById('adminModal').style.display='none'" style="width:100%; background:none; border:none; color:white; opacity:0.5; cursor:pointer;">Cancel</button>
    </div>
</div>

<button class="admin-fab" id="adminFab" onclick="verifyAdmin()">+ ADD EVENT</button>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyC7I_pBRrcLV6sCZzWO4_RmBIrZLoWhXfk",
      authDomain: "axtraplatforms.firebaseapp.com",
      projectId: "axtraplatforms",
      storageBucket: "axtraplatforms.firebasestorage.app",
      messagingSenderId: "764125379196",
      appId: "1:764125379196:web:5465fa0c1a4a87a6fda7f9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const MASTER_KEY = "cxaxtraplatform"; // <--- CHANGE YOUR ADMIN PASSWORD HERE

    auth.onAuthStateChanged(user => {
        if(user && user.email === 'satyam.nigam2011@gmail.com') { // Replace with your email
            document.getElementById('adminFab').style.display = 'block';
        }
        loadCalendar();
    });

    function verifyAdmin() {
        const pass = prompt("Enter Axtra Admin Key:");
        if(pass === MASTER_KEY) {
            document.getElementById('adminModal').style.display = 'flex';
        } else {
            alert("Unauthorized Access Attempt.");
        }
    }

    async function savePodcast() {
        const data = {
            title: document.getElementById('pTitle').value,
            host: document.getElementById('pHost').value,
            artist: document.getElementById('pArtist').value,
            lang: document.getElementById('pLong').value,
            genre: document.getElementById('pGenre').value,
            banner: document.getElementById('pBanner').value || 'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=800',
            date: document.getElementById('pDate').value
        };

        await db.collection("podcasts").add(data);
        location.reload();
    }

    function loadCalendar() {
        db.collection("podcasts").orderBy("date", "asc").onSnapshot(snap => {
            const grid = document.getElementById('calendar');
            grid.innerHTML = '';
            const now = new Date();

            snap.forEach(doc => {
                const p = doc.data();
                const pDate = new Date(p.date);

                // AUTO-DELETE EXPIRED
                if(pDate < now) {
                    db.collection("podcasts").doc(doc.id).delete();
                    return;
                }

                const card = document.createElement('div');
                card.className = 'cal-card';
                card.onclick = () => showDetails(p);
                card.innerHTML = `
                    <div class="date-circle">
                        <span>${pDate.getDate()}</span>
                        <span style="font-size:8px">${pDate.toLocaleString('default', { month: 'short' })}</span>
                    </div>
                    <h3 style="margin-bottom:5px">${p.title}</h3>
                    <p style="font-size:12px; color:var(--accent)">w/ ${p.host}</p>
                `;
                grid.appendChild(card);
            });
        });
    }

    function showDetails(p) {
        document.getElementById('mTitle').innerText = p.title;
        document.getElementById('mHost').innerText = "HOSTED BY " + p.host;
        document.getElementById('mArtist').innerText = p.artist;
        document.getElementById('mDate').innerText = new Date(p.date).toLocaleString();
        document.getElementById('mLong').innerText = p.lang;
        document.getElementById('mGenre').innerText = p.genre;
        document.getElementById('mBanner').style.backgroundImage = `url('${p.banner}')`;
        document.getElementById('mTags').innerHTML = `<span class="tag">LIVE</span><span class="tag">${p.genre.toUpperCase()}</span>`;
        document.getElementById('eventModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('eventModal').style.display = 'none'; }
</script>

</body>
</html>
